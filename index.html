<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本の重要人物 フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }

header { background: #fff; border-bottom: 0.5px solid #dddbd2; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.03em; }
header p { font-size: 12px; color: #888; }

.controls { padding: 1rem 1.5rem; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: #f5f4f0; position: sticky; top: 57px; z-index: 9; border-bottom: 0.5px solid #dddbd2; }
.search { flex: 1; min-width: 180px; font-size: 13px; padding: 7px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; font-family: inherit; }
.filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #555; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.filter-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.mode-toggle { margin-left: auto; display: flex; gap: 6px; }
.mode-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #555; cursor: pointer; font-family: inherit; }
.mode-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }

main { padding: 1.5rem; }
.stats { font-size: 12px; color: #888; margin-bottom: 1rem; }

/* カードグリッド */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }

.card { background: #fff; border: 0.5px solid #dddbd2; border-radius: 14px; padding: 1.25rem; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; position: relative; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }

/* ★ 写真エリア ★ */
.photo-wrap { width: 64px; height: 64px; border-radius: 50%; overflow: hidden; margin-bottom: 10px; border: 2px solid #eee; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
.photo-wrap img { width: 100%; height: 100%; object-fit: cover; }

.cat-label { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.name-ja { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.name-en { font-size: 11px; color: #888; margin-bottom: 6px; }
.role { font-size: 12px; color: #555; line-height: 1.5; }
.tags { margin-top: 8px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #f0f0ee; color: #666; display: inline-block; margin: 2px 2px 0 0; }
.flip-hint { font-size: 10px; color: #bbb; margin-top: 10px; text-align: right; }

.card .back { display: none; }
.card.flipped .front { display: none; }
.card.flipped .back { display: block; }
.profile-text { font-size: 12px; color: #333; line-height: 1.8; margin-top: 8px; }
.org-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.born-label { font-size: 11px; color: #aaa; margin-top: 4px; }

/* クイズ */
.quiz-wrap { display: flex; justify-content: center; padding: 2rem 0; }
.quiz-card { background: #fff; border: 0.5px solid #dddbd2; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; }
.progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.3s; }
.quiz-counter { font-size: 12px; color: #888; margin-bottom: 0.5rem; }
.quiz-question { font-size: 18px; font-weight: 700; color: #1a1a18; margin-bottom: 6px; line-height: 1.5; }
.quiz-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quiz-opt { font-size: 13px; padding: 12px 8px; border-radius: 10px; border: 0.5px solid #ddd; background: #fff; color: #1a1a18; cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; }
.quiz-opt:hover { background: #f5f4f0; }
.quiz-opt.correct { background: #E1F5EE; border-color: #1D9E75; color: #085041; font-weight: 700; }
.quiz-opt.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
.quiz-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.quiz-score-text { font-size: 12px; color: #888; }
.next-btn { font-size: 13px; padding: 8px 18px; border-radius: 8px; border: 0.5px solid #ccc; background: #1a1a18; color: #fff; cursor: pointer; font-family: inherit; display: none; }
.restart-btn { font-size: 14px; padding: 10px 24px; border-radius: 10px; border: none; background: #1a1a18; color: #fff; cursor: pointer; font-family: inherit; margin-top: 1rem; width: 100%; }

/* 凡例 */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🇯🇵 日本の重要人物</h1>
    <p>政治家・経営者・研究者・リーダー — フラッシュカード学習</p>
  </div>
</header>

<div class="controls">
  <input class="search" type="text" placeholder="名前・キーワードで検索..." id="search" />
  <button class="filter-btn active" data-cat="all">すべて</button>
  <button class="filter-btn" data-cat="政治家">🏛 政治家</button>
  <button class="filter-btn" data-cat="経営者">💼 経営者</button>
  <button class="filter-btn" data-cat="研究者">🔬 研究者</button>
  <button class="filter-btn" data-cat="リーダー">🌐 リーダー</button>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-card">📇 カード</button>
    <button class="mode-btn" id="btn-quiz">🧠 クイズ</button>
  </div>
</div>

<main>
  <!-- カードモード -->
  <div id="card-mode">
    <p class="stats" id="stats"></p>
    <div class="grid" id="grid"></div>
  </div>

  <!-- クイズモード -->
  <div id="quiz-mode" style="display:none">
    <div class="quiz-wrap">
      <div class="quiz-card">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <p class="quiz-counter" id="quiz-counter"></p>
        <p class="quiz-question" id="quiz-q"></p>
        <p class="quiz-sub" id="quiz-hint"></p>
        <div class="quiz-options" id="quiz-opts"></div>
        <div class="quiz-footer">
          <span class="quiz-score-text" id="quiz-score-text">正解: 0</span>
          <button class="next-btn" id="next-btn">次へ →</button>
        </div>
      </div>
    </div>
  </div>
</main>

// カテゴリ設定
const catConfig = {
  "政治家": { bg:"#E6F1FB", text:"#0C447C", avatarBg:"#B5D4F4", avatarText:"#042C53" },
  "経営者": { bg:"#FAEEDA", text:"#633806", avatarBg:"#FAC775", avatarText:"#412402" },
  "研究者": { bg:"#E1F5EE", text:"#085041", avatarBg:"#9FE1CB", avatarText:"#04342C" },
  "リーダー":{ bg:"#EEEDFE", text:"#3C3489", avatarBg:"#CECBF6", avatarText:"#26215C" },
};

let currentCat = "all", searchQ = "";

function getInitials(name) { return name.replace(/\s/g,"").slice(0,2); }

function renderCards() {
  const filtered = people.filter(p => {
    const matchCat = currentCat === "all" || p.cat === currentCat;
    const q = searchQ.toLowerCase();
    const matchSearch = !q || p.name.includes(q) || p.nameEn.toLowerCase().includes(q) || p.role.includes(q) || p.org.includes(q) || p.tags.some(t=>t.includes(q));
    return matchCat && matchSearch;
  });
  document.getElementById("stats").textContent = `${filtered.length}人を表示中（タップでプロフィール表示）`;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  filtered.forEach(p => {
    const c = catConfig[p.cat];
    const div = document.createElement("div");
    div.className = "card";

    // 写真 or イニシャル
    const photoHTML = p.photo
      ? `<div class="photo-wrap"><img src="${p.photo}" alt="${p.name}" /></div>`
      : `<div class="photo-wrap" style="background:${c.avatarBg};color:${c.avatarText}">${getInitials(p.name)}</div>`;

    div.innerHTML = `
      <div class="front">
        ${photoHTML}
        <span class="cat-label" style="background:${c.bg};color:${c.text}">${p.cat}</span>
        <p class="name-ja">${p.name}</p>
        <p class="name-en">${p.nameEn}</p>
        <p class="role">${p.role}</p>
        <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <p class="flip-hint">タップ → プロフィール</p>
      </div>
      <div class="back">
        ${photoHTML}
        <span class="cat-label" style="background:${c.bg};color:${c.text}">${p.cat}</span>
        <p class="name-ja" style="margin-top:6px">${p.name}</p>
        <p class="org-label">${p.org}</p>
        <p class="born-label">${p.born}</p>
        <p class="profile-text">${p.profile}</p>
        <p class="flip-hint">タップ → 戻る</p>
      </div>`;
    div.addEventListener("click", () => div.classList.toggle("flipped"));
    grid.appendChild(div);
  });
}

// フィルター
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.cat;
    renderCards();
  });
});
document.getElementById("search").addEventListener("input", e => { searchQ = e.target.value; renderCards(); });

// ===== クイズ =====
let quizList = [], quizIdx = 0, quizScore = 0, quizAnswered = false;

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function startQuiz() {
  quizList = shuffle([...people]);
  quizIdx = 0; quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizList.length) {
    document.getElementById("quiz-q").textContent = "お疲れ様でした！";
    document.getElementById("quiz-hint").textContent = `最終スコア: ${quizScore} / ${quizList.length} 問正解`;
    document.getElementById("quiz-opts").innerHTML = `<button class="restart-btn" onclick="startQuiz()">もう一度チャレンジ</button>`;
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("quiz-counter").textContent = "完了";
    document.getElementById("progress-fill").style.width = "100%";
    return;
  }
  quizAnswered = false;
  const person = quizList[quizIdx];
  const wrongs = shuffle(people.filter(p=>p.name!==person.name)).slice(0,3).map(p=>p.name);
  const opts = shuffle([person.name, ...wrongs]);

  document.getElementById("quiz-counter").textContent = `${quizIdx+1} / ${quizList.length}`;
  document.getElementById("quiz-q").textContent = person.role;
  document.getElementById("quiz-hint").textContent = `所属: ${person.org}`;
  document.getElementById("progress-fill").style.width = (quizIdx/quizList.length*100)+"%";
  document.getElementById("quiz-score-text").textContent = `正解: ${quizScore}`;
  document.getElementById("next-btn").style.display = "none";

  const optsEl = document.getElementById("quiz-opts");
  optsEl.innerHTML = "";
  opts.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "quiz-opt";
    btn.textContent = name;
    btn.addEventListener("click", () => {
      if (quizAnswered) return;
      quizAnswered = true;
      if (name === person.name) { btn.classList.add("correct"); quizScore++; }
      else {
        btn.classList.add("wrong");
        optsEl.querySelectorAll(".quiz-opt").forEach(b => { if (b.textContent===person.name) b.classList.add("correct"); });
      }
      document.getElementById("quiz-score-text").textContent = `正解: ${quizScore}`;
      document.getElementById("next-btn").style.display = "inline-block";
    });
    optsEl.appendChild(btn);
  });
}

document.getElementById("next-btn").addEventListener("click", () => { quizIdx++; renderQuiz(); });

// モード切替
document.getElementById("btn-card").addEventListener("click", () => {
  document.getElementById("card-mode").style.display = "";
  document.getElementById("quiz-mode").style.display = "none";
  document.getElementById("btn-card").classList.add("active");
  document.getElementById("btn-quiz").classList.remove("active");
});
document.getElementById("btn-quiz").addEventListener("click", () => {
  document.getElementById("card-mode").style.display = "none";
  document.getElementById("quiz-mode").style.display = "";
  document.getElementById("btn-quiz").classList.add("active");
  document.getElementById("btn-card").classList.remove("active");
  startQuiz();
});

renderCards();
</script>
</body>
</html>
